      <a href="admin-register.html" style="flex: 1; padding: 20px; background: #f59e0b; color: white; text-align: center; text-decoration: none; border-radius: 10px; font-size: 18px; font-weight: bold;">🧑‍💼 Register/Login Admin</a>
