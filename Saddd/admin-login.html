<!DOCTYPE html>
<html>
<head>
  <title>Admin Login - Course Management</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container { max-width: 400px; margin: 100px auto; padding: 20px; }
    .auth-form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    input[type="email"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-form">
    <h2>🧑‍💼 Admin Portal</h2>
    

    <div id="loginForm">
      <h3>👆 Register First, Then Login</h3>
      <a href="admin-register.html" style="display: block; padding: 15px; background: #f59e0b; color: white; text-align: center; text-decoration: none; border-radius: 5px; margin: 10px 0;">📝 Register Admin</a>
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p><small>Registered? Login above</small> | <a href="student-login.html">Student Portal →</a></p>
    </div>

  </div>
</div>

<script type="module">
  import { auth } from './firebase.js';
  import { signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
  import { db } from './firebase.js';
  import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

window.login = async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      if (error.code === 'auth/user-not-found') {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', userCredential.user.uid), { email, role: 'admin' });
        alert('Admin account created & logged in!');
      } else {
        alert(error.message);
      }
    }
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists() && userDoc.data().role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        alert('Student account - use Student Portal');
        auth.signOut();
      }
    }
  });
</script>

</body>
</html>
